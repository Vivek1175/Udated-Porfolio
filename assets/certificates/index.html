<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Detail | Vivek Sharma</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .container { max-width: 900px; margin: 100px auto; padding: 40px; background: var(--card-bg); border-radius: 40px; border: 1px solid var(--glass-border); text-align: center; }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; color: var(--highlight); text-decoration: none; margin-bottom: 40px; }
        .cert-frame { width: 100%; height: 500px; background: rgba(255,255,255,0.02); margin-top: 30px; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 20px; overflow: hidden; border: 1px dashed var(--glass-border); }
        .cert-placeholder { color: var(--text-secondary); font-size: 1.2rem; }
    </style>
</head>
<body class="dark-theme">
    <div class="container reveal active">
        <a href="../../index.html" class="back-btn">← Back to Portfolio</a>
        <h1 id="cert-title">Certificate Detail</h1>
        <div class="cert-frame">
            <div class="cert-placeholder">Loading Certificate Image...<br><i>(Replace this with your certificate scan)</i></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cert = urlParams.get('c') || 'Certification Record';
        document.title = cert + " | Vivek Sharma";
        document.getElementById('cert-title').innerText = cert;
    </script>
</body>
</html>
