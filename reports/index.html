<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Report | Vivek Sharma</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .container { max-width: 1000px; margin: 100px auto; padding: 60px; background: var(--card-bg); border-radius: 40px; border: 1px solid var(--glass-border); text-align: center; }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; color: var(--highlight); text-decoration: none; margin-bottom: 40px; }
        .report-frame { width: 100%; height: 800px; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); background: var(--glass); display: flex; align-items: center; justify-content: center; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .report-placeholder { padding: 80px; color: var(--text-secondary); }
    </style>
</head>
<body class="dark-theme">
    <div class="container reveal active">
        <a href="../index.html" class="back-btn">← Back to Portfolio</a>
        <h1 id="report-title">Project Report</h1>
        <div id="viewer-container" class="report-frame">
            <div id="loading" class="report-placeholder">Loading Data Report...<br><i>(Ensure your PDF is in reports/ folder)</i></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const project = urlParams.get('p') || 'Project Summary';
        document.title = project + " | Vivek Sharma Report";
        document.getElementById('report-title').innerText = project;

        // EXACT Filename Mapping for reports
        const reportMap = {
            'Mobile Sales Performance Dashboard': 'PowerBI Dashboard.pdf',
            'Bank Loan Default Prediction': 'my predictive analysis report.pdf',
            'EV Registration Market Trends': 'excel report EV analysis.pdf'
        };

        const container = document.getElementById('viewer-container');
        const loading = document.getElementById('loading');
        const fileName = reportMap[project];

        if (fileName) {
            const iframe = document.createElement('iframe');
            iframe.src = fileName;
            container.innerHTML = '';
            container.appendChild(iframe);
        } else {
            loading.innerText = "No specific mapping for: " + project;
        }
    </script>
</body>
</html>
